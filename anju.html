<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            margin-top: 100px;
        }
        h1 {
            font-size: 40px;
        }
        p {
            font-size: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: #333;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Website </h1>
    <p>This site is hosted using GitHub Pages</p>

    <button onclick="showMessage()">Click Me</button>

    <script>
        function showMessage() {
            alert("Hello! Your website is working ");
        }
    </script>

</body>
</html>
